<!DOCTYPE html>
<html>
<head>
  <title>Admin – Match Selector</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    #filters {
      margin-bottom: 20px;
    }

    button.filter {
      background: #333;
      color: white;
      border: none;
      padding: 10px 15px;
      margin-right: 10px;
      cursor: pointer;
      border-radius: 5px;
    }

    button.filter.active {
      background: #007bff;
    }

    .match-card {
      background: #1a1a1a;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      cursor: pointer;
      border: 1px solid #333;
    }

    .match-card:hover {
      background: #222;
    }

    .team-logo {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #444;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin-right: 15px;
    }

    .match-info {
      flex: 1;
    }

    .series {
      font-size: 14px;
      color: #aaa;
    }

    .status {
      font-size: 14px;
      margin-top: 5px;
      color: #0f0;
    }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      background: #444;
      border-radius: 4px;
      font-size: 12px;
      margin-left: 10px;
    }
  </style>
</head>

<body>

<h1>Match Control Panel</h1>

<div id="filters">
  <button class="filter active" onclick="setFilter('all')">ALL</button>
  <button class="filter" onclick="setFilter('live')">LIVE ONLY</button>
  <button class="filter" onclick="setFilter('completed')">COMPLETED ONLY</button>
</div>

<div id="matchList">Loading matches...</div>

<script>
let allMatches = [];
let currentFilter = "all";

function setFilter(type) {
  currentFilter = type;

  document.querySelectorAll(".filter").forEach(btn => btn.classList.remove("active"));
  document.querySelector(`button[onclick="setFilter('${type}')"]`).classList.add("active");

  renderMatches();
}

function getTeamLogo(teamName) {
  const letter = teamName ? teamName.charAt(0).toUpperCase() : "?";
  return `<div class="team-logo">${letter}</div>`;
}

function getMatchType(title) {
  title = title.toLowerCase();
  if (title.includes("t20")) return "T20";
  if (title.includes("odi")) return "ODI";
  if (title.includes("test")) return "TEST";
  return "";
}

async function loadMatches() {
  const res = await fetch("/matches");
  const matches = await res.json();
  allMatches = matches;
  renderMatches();
}

function renderMatches() {
  const container = document.getElementById("matchList");
  container.innerHTML = "";

  let filtered = allMatches;

  if (currentFilter === "live") {
    filtered = filtered.filter(m => m.status.toLowerCase().includes("live"));
  }

  if (currentFilter === "completed") {
    filtered = filtered.filter(m => m.status.toLowerCase().includes("won") || m.status.toLowerCase().includes("result"));
  }

  if (filtered.length === 0) {
    container.innerHTML = "<p>No matches found.</p>";
    return;
  }

  filtered.forEach(match => {
    const teams = match.match.split(" - ")[1] || match.match;
    const [team1, team2] = teams.split(" vs ");

    const matchType = getMatchType(match.match);

    const card = document.createElement("div");
    card.className = "match-card";
    card.onclick = () => startMatch(match);

    card.innerHTML = `
      ${getTeamLogo(team1)}
      ${getTeamLogo(team2)}
      <div class="match-info">
        <div class="series">${match.series || ""}</div>
        <div><strong>${match.match}</strong>
          ${matchType ? `<span class="badge">${matchType}</span>` : ""}
        </div>
        <div class="status">${match.status}</div>
      </div>
    `;

    container.appendChild(card);
  });
}

async function startMatch(match) {
  await fetch("/start-match", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(match)
  });

  alert("Match started: " + match.match);
}

loadMatches();
</script>

</body>
</html>
