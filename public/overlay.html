<!DOCTYPE html>
<html>
<head>

<title>Cricket Overlay</title>

<style>

body{
font-family:Arial;
background:black;
color:white;
text-align:center;
}

#teams{
font-size:28px;
margin-top:20px;
}

#score{
font-size:40px;
margin-top:10px;
}

#commentary{
font-size:22px;
margin-top:20px;
}

</style>

</head>

<body>

<div id="teams">Waiting for match</div>

<div id="score"></div>

<div id="commentary"></div>

<audio id="audioPlayer"></audio>

<script>

const socket = new WebSocket("wss://cricket-data-server.onrender.com")

socket.onmessage = function(event){

const data = JSON.parse(event.data)

if(data.teams){
document.getElementById("teams").innerText = data.teams
}

if(data.score){
document.getElementById("score").innerText = data.score
}

if(data.commentary){
document.getElementById("commentary").innerText = data.commentary
}

if(data.audio){

const player = document.getElementById("audioPlayer")

player.src = data.audio + "?t=" + Date.now()

player.play()

}

}

</script>

</body>
</html>
