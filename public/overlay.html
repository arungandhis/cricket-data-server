<!DOCTYPE html>
<html>

<head>

<title>Live Commentary Overlay</title>

<style>

body{
 background:black;
 color:white;
 font-size:32px;
 text-align:center;
 font-family:Arial;
}

</style>

</head>

<body>

<h2>Live Commentary</h2>

<div id="commentary">Waiting for commentary...</div>

<audio id="audio" autoplay></audio>

<script>

const socket = new WebSocket("wss://cricket-data-server.onrender.com")

socket.onmessage = function(event){

 const text = event.data

 document.getElementById("commentary").innerText = text

 const audio=document.getElementById("audio")

 audio.src="/commentary.mp3?t="+new Date().getTime()

 audio.play()

}

</script>

</body>
</html>
