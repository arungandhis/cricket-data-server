<!DOCTYPE html>
<html>

<head>

<title>AI Cricket Broadcast</title>

<style>

body{
margin:0;
background:#0b0b0b;
font-family:Arial;
color:white;
}

#scorebar{
position:absolute;
bottom:0;
width:100%;
background:#111;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

#teams{
font-size:24px;
font-weight:bold;
}

#score{
font-size:32px;
color:#00ffcc;
}

#commentaryBar{
position:absolute;
bottom:80px;
width:100%;
background:#000;
padding:15px;
text-align:center;
font-size:20px;
color:#ffd700;
}

#batsmen{
position:absolute;
bottom:140px;
width:100%;
text-align:center;
font-size:18px;
}

#bowler{
position:absolute;
bottom:170px;
width:100%;
text-align:center;
font-size:18px;
}

</style>

</head>

<body>

<div id="bowler"></div>

<div id="batsmen"></div>

<div id="commentaryBar">
Waiting for commentary...
</div>

<div id="scorebar">

<div id="teams">
Waiting for match
</div>

<div id="score">
0/0
</div>

</div>

<audio id="audioPlayer"></audio>

<script>

const socket = new WebSocket("wss://cricket-data-server.onrender.com")

socket.onmessage = function(event){

const data = JSON.parse(event.data)

/* TEAMS */

if(data.teams){
document.getElementById("teams").innerText = data.teams
}

/* SCORE */

if(data.score){
document.getElementById("score").innerText = data.score
}

/* COMMENTARY */

if(data.commentary){
document.getElementById("commentaryBar").innerText = data.commentary
}

/* BATSMEN */

if(data.batsmen){
document.getElementById("batsmen").innerText =
data.batsmen.join(" | ")
}

/* BOWLER */

if(data.bowler){
document.getElementById("bowler").innerText =
"Bowler: " + data.bowler
}

/* AUDIO */

if(data.audio){

const player = document.getElementById("audioPlayer")

player.src = data.audio + "?t=" + Date.now()

player.play().catch(()=>{})

}

}

</script>

</body>

</html>
