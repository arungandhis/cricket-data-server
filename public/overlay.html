<!DOCTYPE html>
<html>

<head>

<title>Cricket Broadcast Overlay</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
}

#teams{
position:absolute;
bottom:100px;
width:100%;
text-align:center;
font-size:28px;
font-weight:bold;
}

#score{
position:absolute;
bottom:70px;
width:100%;
text-align:center;
font-size:36px;
color:#00ffcc;
}

#batsmen{
position:absolute;
bottom:40px;
width:100%;
text-align:center;
font-size:18px;
}

#bowler{
position:absolute;
bottom:20px;
width:100%;
text-align:center;
font-size:18px;
}

#commentary{
position:absolute;
bottom:140px;
width:100%;
text-align:center;
font-size:22px;
color:#ffd700;
}

</style>

</head>

<body>

<div id="teams">Waiting for match...</div>

<div id="score"></div>

<div id="commentary">Waiting for commentary...</div>

<div id="batsmen"></div>

<div id="bowler"></div>

<audio id="audioPlayer"></audio>

<script>

/* CONNECT TO WEBSOCKET */

const socket = new WebSocket("wss://cricket-data-server.onrender.com")

socket.onopen = () => {

console.log("Overlay connected")

}

socket.onmessage = (event) => {

const data = JSON.parse(event.data)

console.log("Overlay received:",data)

/* TEAMS */

if(data.teams){
document.getElementById("teams").innerText = data.teams
}

/* SCORE */

if(data.score){
document.getElementById("score").innerText = data.score
}

/* COMMENTARY */

if(data.commentary){
document.getElementById("commentary").innerText = data.commentary
}

/* BATSMEN */

if(data.batsmen){
document.getElementById("batsmen").innerText =
data.batsmen.join(" | ")
}

/* BOWLER */

if(data.bowler){
document.getElementById("bowler").innerText =
"Bowler: " + data.bowler
}

/* AUDIO */

if(data.audio){

const player = document.getElementById("audioPlayer")

player.src = data.audio + "?t=" + Date.now()

player.play().catch(()=>{})

}

}

socket.onerror = (err)=>{
console.log("Socket error:",err)
}

socket.onclose = ()=>{
console.log("Socket closed")
}

</script>

</body>

</html>
