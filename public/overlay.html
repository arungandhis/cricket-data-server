<!DOCTYPE html>
<html>

<head>

<title>Cricket Overlay</title>

<style>

body{
font-family: Arial;
background: transparent;
color:white;
}

#scoreboard{
position:absolute;
top:20px;
left:20px;
background:rgba(0,0,0,0.7);
padding:20px;
border-radius:10px;
}

#teams{
font-size:24px;
}

#score{
font-size:20px;
margin-top:5px;
}

#commentary{
margin-top:10px;
font-size:18px;
}

</style>

</head>

<body>

<div id="scoreboard">

<h2 id="teams">Waiting for match...</h2>

<h3 id="score"></h3>

<div id="commentary"></div>

</div>

<script>

const socket = new WebSocket("wss://cricket-data-server.onrender.com")

socket.onmessage = function(event){

const data = JSON.parse(event.data)

if(data.type === "commentary"){

document.getElementById("teams").innerText = data.teams
document.getElementById("score").innerText = data.score
document.getElementById("commentary").innerText = data.commentary

}

}

</script>

</body>
</html>
