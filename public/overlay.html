<!DOCTYPE html>
<html>
<head>
  <title>Overlay</title>
  <style>
    body {
      margin: 0;
      background: transparent;
      font-family: Arial, sans-serif;
      color: white;
    }

    #container {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 600px;
      padding: 15px;
      background: rgba(0,0,0,0.6);
      border-radius: 10px;
    }

    #score {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    #commentary {
      font-size: 20px;
      margin-bottom: 10px;
    }

    #batsmen, #bowler {
      font-size: 16px;
      opacity: 0.8;
    }

    /* EVENT ANIMATIONS */
    #eventBanner {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 20px 40px;
      font-size: 40px;
      font-weight: bold;
      border-radius: 10px;
      display: none;
      animation: pop 0.6s ease-out;
    }

    @keyframes pop {
      0% { transform: translateX(-50%) scale(0.5); opacity: 0; }
      100% { transform: translateX(-50%) scale(1); opacity: 1; }
    }

    .four { background: #007bff; }
    .six { background: #8e44ad; }
    .wicket { background: #e74c3c; }
  </style>
</head>

<body>

<div id="eventBanner"></div>

<div id="container">
  <div id="score">Waiting for score...</div>
  <div id="commentary">Waiting for commentary...</div>
  <div id="batsmen"></div>
  <div id="bowler"></div>
</div>

<audio id="audioPlayer"></audio>

<script>
const wsProtocol = location.protocol === "https:" ? "wss" : "ws";
const ws = new WebSocket(`${wsProtocol}://${location.host}`);

ws.onmessage = (msg) => {
  const data = JSON.parse(msg.data);

  document.getElementById("score").textContent = data.score || "";
  document.getElementById("commentary").textContent = data.commentary || "";

  document.getElementById("batsmen").innerHTML =
    data.batsmen?.map(b => "• " + b).join("<br>") || "";

  document.getElementById("bowler").textContent =
    data.bowler ? "Bowler: " + data.bowler : "";

  // AUDIO
  if (data.audio) {
    const audio = document.getElementById("audioPlayer");
    audio.src = data.audio;
    audio.play().catch(() => {});
  }

  // EVENT ANIMATION
  if (data.event) {
    const banner = document.getElementById("eventBanner");
    banner.textContent = data.event;

    banner.className =
      data.event === "FOUR" ? "four" :
      data.event === "SIX" ? "six" :
      data.event === "WICKET" ? "wicket" : "";

    banner.style.display = "block";

    setTimeout(() => {
      banner.style.display = "none";
    }, 2000);
  }
};
</script>

</body>
</html>
