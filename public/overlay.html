<!DOCTYPE html>
<html>
<head>
  <title>Live Overlay</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #container {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 95%;
    }

    #teams {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    #score {
      font-size: 28px;
      margin-bottom: 15px;
    }

    #batsmen, #bowler {
      font-size: 22px;
      margin-bottom: 8px;
    }

    #commentary {
      font-size: 30px;
      font-weight: bold;
      margin-top: 20px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Fade animation */
    .fade {
      animation: fadeIn 0.4s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<div id="container">
  <div id="teams"></div>
  <div id="score"></div>
  <div id="batsmen"></div>
  <div id="bowler"></div>
  <div id="commentary"></div>
</div>

<audio id="player" autoplay></audio>

<script>
let ws;

function connectWS() {
  const protocol = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${protocol}://${location.host}`);

  ws.onopen = () => console.log("WebSocket connected");

  ws.onmessage = (msg) => {
    const data = JSON.parse(msg.data);

    updateField("teams", data.teams);
    updateField("score", data.score);

    if (data.batsmen && data.batsmen.length > 0) {
      updateField("batsmen", "Batsmen: " + data.batsmen.join(" | "));
    }

    if (data.bowler) {
      updateField("bowler", "Bowler: " + data.bowler);
    }

    if (data.commentary) {
      updateField("commentary", data.commentary, true);
    }

    if (data.audio) {
      const player = document.getElementById("player");
      player.src = data.audio + "?t=" + Date.now();
      player.play().catch(() => {});
    }
  };

  ws.onclose = () => {
    console.log("WebSocket disconnected, retrying...");
    setTimeout(connectWS, 2000);
  };
}

function updateField(id, text, animate = false) {
  const el = document.getElementById(id);
  if (!el) return;

  if (animate) {
    el.classList.remove("fade");
    void el.offsetWidth; // restart animation
    el.classList.add("fade");
  }

  el.textContent = text;
}

connectWS();
</script>

</body>
</html>
