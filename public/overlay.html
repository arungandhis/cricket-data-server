<!DOCTYPE html>
<html>

<head>

<title>AI Cricket Broadcast Overlay</title>

<style>

body{
 background:black;
 color:white;
 font-family:Arial, Helvetica, sans-serif;
 text-align:center;
 padding-top:40px;
}

#scoreboard{
 font-size:34px;
 margin-bottom:10px;
}

#overs{
 font-size:24px;
 margin-bottom:20px;
}

#players{
 font-size:22px;
 margin-bottom:30px;
}

#commentary{
 font-size:28px;
 font-weight:bold;
 color:yellow;
}

</style>

</head>

<body>

<div id="scoreboard">

<div id="team1">Loading...</div>
<div id="team2"></div>

</div>

<div id="overs"></div>

<div id="players">

<div id="batsman1"></div>
<div id="batsman2"></div>
<div id="bowler"></div>

</div>

<div id="commentary">
Waiting for commentary...
</div>

<audio id="audio" autoplay></audio>

<script>

const socket = new WebSocket("wss://cricket-data-server.onrender.com")

const audio = document.getElementById("audio")

socket.onopen = function(){
 console.log("Overlay connected to server")
}

socket.onmessage = function(event){

 const data = JSON.parse(event.data)

 console.log("Received update:",data)

 document.getElementById("team1").innerText =
  data.team1 || ""

 document.getElementById("team2").innerText =
  data.team2 || ""

 document.getElementById("overs").innerText =
  "Overs: " + (data.overs || "")

 document.getElementById("batsman1").innerText =
  data.batsman1 || ""

 document.getElementById("batsman2").innerText =
  data.batsman2 || ""

 document.getElementById("bowler").innerText =
  data.bowler ? "Bowler: " + data.bowler : ""

 document.getElementById("commentary").innerText =
  data.commentary || "Waiting for commentary..."

 // refresh audio
 audio.src = "/commentary.mp3?t=" + new Date().getTime()

 audio.play().catch(()=>{})

}

socket.onerror = function(err){
 console.log("WebSocket error:",err)
}

socket.onclose = function(){
 console.log("WebSocket disconnected")
}

</script>

</body>

</html>
