<!DOCTYPE html>
<html>

<head>

<title>AI Cricket Broadcast</title>

<style>

body{
margin:0;
background:#0b0b0b;
font-family:Arial;
color:white;
overflow:hidden;
}

/* SCOREBAR */

#scorebar{

position:absolute;
bottom:0;
width:100%;
background:linear-gradient(90deg,#111,#1c1c1c);
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
border-top:3px solid #00eaff;

}

/* TEAMS */

#teams{
font-size:26px;
font-weight:bold;
}

/* SCORE */

#score{
font-size:36px;
font-weight:bold;
color:#00ffcc;
}

/* COMMENTARY BAR */

#commentaryBar{

position:absolute;
bottom:80px;
width:100%;
background:rgba(0,0,0,0.85);
padding:15px;
font-size:22px;
text-align:center;
color:#ffd700;

}

/* LOGO */

#logo{

position:absolute;
top:20px;
left:20px;
font-size:22px;
font-weight:bold;
color:#00eaff;

}

</style>

</head>

<body>

<div id="logo">
AI Cricket Broadcast
</div>

<div id="commentaryBar">
Waiting for commentary...
</div>

<div id="scorebar">

<div id="teams">
Waiting for match
</div>

<div id="score">
0/0
</div>

</div>

<audio id="audioPlayer"></audio>

<script>

/* WEBSOCKET CONNECTION */

const socket = new WebSocket("wss://cricket-data-server.onrender.com")

socket.onopen = ()=>{
console.log("Overlay connected")
}

/* RECEIVE DATA */

socket.onmessage = function(event){

const data = JSON.parse(event.data)

console.log("Overlay data:",data)

/* TEAMS */

if(data.teams){
document.getElementById("teams").innerText = data.teams
}

/* SCORE */

if(data.score){
document.getElementById("score").innerText = data.score
}

/* COMMENTARY */

if(data.commentary){
document.getElementById("commentaryBar").innerText = data.commentary
}

/* AUDIO */

if(data.audio){

const player = document.getElementById("audioPlayer")

player.src = data.audio + "?t=" + Date.now()

player.play().catch(()=>{})

}

}

/* SOCKET ERROR */

socket.onerror = (err)=>{
console.log("Socket error",err)
}

socket.onclose = ()=>{
console.log("Socket closed")
}

</script>

</body>

</html>
