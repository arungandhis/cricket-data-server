<!DOCTYPE html>
<html>

<head>
<title>Commentary Overlay</title>

<style>

body{
 background:black;
 color:white;
 font-size:30px;
 text-align:center;
}

</style>

</head>

<body>

<div id="commentary">Waiting for commentary...</div>

<script>

const socket = new WebSocket("wss://cricket-data-server.onrender.com")

socket.onmessage = function(event){

 document.getElementById("commentary").innerText = event.data

}

</script>

</body>
</html>
