<!DOCTYPE html>
<html>

<head>
<title>AI Cricket Broadcast Overlay</title>

<style>

body{
 background:black;
 color:white;
 font-family:Arial;
 text-align:center;
 padding-top:40px;
}

#scoreboard{
 font-size:36px;
 font-weight:bold;
 margin-bottom:10px;
}

#teams{
 margin-bottom:10px;
}

#overs{
 font-size:24px;
 margin-bottom:20px;
}

#players{
 font-size:22px;
 margin-bottom:25px;
}

#commentary{
 font-size:30px;
 color:yellow;
 font-weight:bold;
}

</style>

</head>

<body>

<div id="scoreboard">

<div id="teams">
<span id="team1">Loading...</span>
vs
<span id="team2"></span>
</div>

<div id="overs"></div>

</div>


<div id="players">

<div id="batsman1"></div>
<div id="batsman2"></div>
<div id="bowler"></div>

</div>


<div id="commentary">
Waiting for commentary...
</div>


<audio id="audio" autoplay></audio>


<script>

const socket = new WebSocket("wss://cricket-data-server.onrender.com")

const team1 = document.getElementById("team1")
const team2 = document.getElementById("team2")
const overs = document.getElementById("overs")
const batsman1 = document.getElementById("batsman1")
const batsman2 = document.getElementById("batsman2")
const bowler = document.getElementById("bowler")
const commentary = document.getElementById("commentary")
const audio = document.getElementById("audio")


socket.onopen = () => {
 console.log("Overlay connected")
}


socket.onmessage = (event) => {

 const data = JSON.parse(event.data)

 console.log("Overlay data:",data)

 // scoreboard
 team1.innerText = data.team1 ? data.team1 : "Team A"
 team2.innerText = data.team2 ? data.team2 : "Team B"

 overs.innerText = data.overs ? "Overs: " + data.overs : ""

 // players
 batsman1.innerText = data.batsman1 ? data.batsman1 : ""
 batsman2.innerText = data.batsman2 ? data.batsman2 : ""
 bowler.innerText = data.bowler ? "Bowler: " + data.bowler : ""

 // commentary
 commentary.innerText = data.commentary ? data.commentary : "Waiting for commentary..."

 // play audio
 audio.src = "/commentary.mp3?t=" + Date.now()

 audio.play().catch(()=>{})

}


socket.onerror = (err)=>{
 console.log("WebSocket error",err)
}


socket.onclose = ()=>{
 console.log("WebSocket closed")
}

</script>

</body>

</html>
