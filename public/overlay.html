<!DOCTYPE html>
<html>

<head>

<title>Cricket Broadcast Overlay</title>

<style>

body{
 background:black;
 color:white;
 font-family:Arial;
}

#scoreboard{
 background:#111;
 padding:20px;
 margin-bottom:20px;
}

.team{
 font-size:28px;
}

#commentary{
 font-size:32px;
 margin-top:40px;
 text-align:center;
}

</style>

</head>

<body>

<div id="scoreboard">

<div class="team" id="team1">TEAM A - 0/0</div>

<div class="team" id="team2">TEAM B - 0/0</div>

<div id="overs">Overs: 0.0</div>

</div>

<div id="commentary">

Waiting for commentary...

</div>

<audio id="audio" autoplay></audio>

<script>

const socket = new WebSocket("wss://cricket-data-server.onrender.com")

socket.onmessage = function(event){

 const data = JSON.parse(event.data)

 document.getElementById("commentary").innerText = data.commentary

 document.getElementById("team1").innerText = data.team1
 document.getElementById("team2").innerText = data.team2
 document.getElementById("overs").innerText = "Overs: " + data.overs

 const audio=document.getElementById("audio")

 audio.src="/commentary.mp3?t="+new Date().getTime()

 audio.play()

}

</script>

</body>
</html>
