<!DOCTYPE html>
<html>

<head>

<title>Cricket Broadcast Overlay</title>

<style>

body{
 background:black;
 color:white;
 font-family:Arial;
 text-align:center;
}

#scoreboard{
 background:#111;
 padding:20px;
 margin-bottom:20px;
}

.team{
 font-size:28px;
}

#commentary{
 font-size:32px;
 margin-top:40px;
}

#startBtn{
 padding:12px 20px;
 font-size:18px;
 margin-top:20px;
}

</style>

</head>

<body>

<div id="scoreboard">

<div class="team" id="team1">TEAM A</div>
<div class="team" id="team2">TEAM B</div>
<div id="overs">Overs: 0.0</div>

</div>

<div id="commentary">

Waiting for commentary...

</div>

<button id="startBtn">Enable Audio</button>

<audio id="audio"></audio>

<script>

let audioEnabled=false

const audio=document.getElementById("audio")

// unlock audio with user tap
document.getElementById("startBtn").onclick=function(){

 audioEnabled=true

 audio.play().catch(()=>{})

 this.style.display="none"

}

// websocket connection
const socket = new WebSocket("wss://cricket-data-server.onrender.com")

socket.onmessage=function(event){

 const data = JSON.parse(event.data)

 document.getElementById("commentary").innerText=data.commentary
 document.getElementById("team1").innerText=data.team1
 document.getElementById("team2").innerText=data.team2
 document.getElementById("overs").innerText="Overs: "+data.overs

 if(audioEnabled){

  audio.src="/commentary.mp3?t="+new Date().getTime()

  audio.play().catch(()=>{})

 }

}

</script>

</body>
</html>
