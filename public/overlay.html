<!DOCTYPE html>
<html>

<head>

<title>Cricket Broadcast Overlay</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
}

#teams{
position:absolute;
bottom:120px;
width:100%;
text-align:center;
font-size:28px;
font-weight:bold;
}

#score{
position:absolute;
bottom:90px;
width:100%;
text-align:center;
font-size:36px;
color:#00ffcc;
}

#commentary{
position:absolute;
bottom:150px;
width:100%;
text-align:center;
font-size:22px;
color:#ffd700;
}

#batsmen{
position:absolute;
bottom:60px;
width:100%;
text-align:center;
font-size:18px;
}

#bowler{
position:absolute;
bottom:30px;
width:100%;
text-align:center;
font-size:18px;
}

</style>

</head>

<body>

<div id="commentary">Waiting for commentary...</div>

<div id="teams">Waiting for match...</div>

<div id="score"></div>

<div id="batsmen"></div>

<div id="bowler"></div>

<audio id="audioPlayer"></audio>

<script>

/* CONNECT WEBSOCKET */

const socket = new WebSocket(
(location.protocol === "https:" ? "wss://" : "ws://") + location.host
)

socket.onopen = function(){
console.log("Overlay connected")
}

socket.onmessage = function(event){

console.log("Message received:", event.data)

const data = JSON.parse(event.data)

/* UPDATE COMMENTARY */

if(data.commentary){
document.getElementById("commentary").innerText = data.commentary
}

/* UPDATE TEAMS */

if(data.teams){
document.getElementById("teams").innerText = data.teams
}

/* UPDATE SCORE */

if(data.score){
document.getElementById("score").innerText = data.score
}

/* UPDATE BATSMEN */

if(data.batsmen){
document.getElementById("batsmen").innerText =
data.batsmen.join(" | ")
}

/* UPDATE BOWLER */

if(data.bowler){
document.getElementById("bowler").innerText =
"Bowler: " + data.bowler
}

/* PLAY AUDIO */

if(data.audio){

const player = document.getElementById("audioPlayer")

player.src = data.audio + "?t=" + Date.now()

player.play().catch(()=>{})

}

}

socket.onerror = function(err){
console.log("Socket error:",err)
}

socket.onclose = function(){
console.log("Socket closed")
}

</script>

</body>

</html>
